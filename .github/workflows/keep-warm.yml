name: Keep API Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            "${{ vars.API_HEALTH_URL || 'https://bolao-api.onrender.com/v1/health' }}"
